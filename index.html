<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>H4ll0 w0rld Hub</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #050505;
    color: white;
}

/* Container */
.container {
    padding: 20px;
    max-width: 500px;
    margin: auto;
}

/* Title */
h1 {
    text-align: center;
    background: linear-gradient(45deg, #ff0000, #ff4d4d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* Card */
.card {
    background: linear-gradient(145deg, #0a0a0a, #120000);
    border-radius: 15px;
    padding: 15px;
    margin-top: 15px;
    box-shadow: 0 5px 20px rgba(255,0,0,0.2);
    border: 1px solid rgba(255,0,0,0.2);
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(255,0,0,0.5);
}

/* Badge */
.badge {
    font-size: 12px;
    color: #ff4d4d;
    margin-bottom: 5px;
}

/* Input */
input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    background: #111;
    color: white;
}

/* Button */
button {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg, #ff0000, #990000);
    color: white;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <h1>🩸 H4ll0 w0rld Hub</h1>

    <div id="updates"></div>

    <div id="ownerPanel" style="display:none;">
        <input type="text" id="newUpdate" placeholder="Type update...">
        <button onclick="addUpdate()">Post Update</button>
    </div>
</div>

<script>
let role = "";
let encodedPass = "SDQhbDAjVzByTGQkSHViXzlYa1BAMjchelE=";

// LOAD DATA (SAVE SYSTEM)
let updates = JSON.parse(localStorage.getItem("updates")) || [
    "🩸 System initialized",
    "🔥 Welcome to H4ll0 w0rld Hub"
];

function saveUpdates() {
    localStorage.setItem("updates", JSON.stringify(updates));
}

function checkPassword(input) {
    return btoa(input) === encodedPass;
}

// SELECT ROLE
let pilih = prompt("viewer / owner ?");
if (pilih === "owner") {
    let pass = prompt("Password:");
    if (checkPassword(pass)) {
        role = "owner";
        document.getElementById("ownerPanel").style.display = "block";
    } else {
        alert("Wrong Password");
    }
} else {
    role = "viewer";
}

// LOAD UI
function loadUpdates() {
    let container = document.getElementById("updates");
    container.innerHTML = "";

    updates.forEach(u => {
        let div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <div class="badge">UPDATE</div>
            <div>${u}</div>
        `;
        container.appendChild(div);
    });
}

function addUpdate() {
    let input = document.getElementById("newUpdate");
    if (input.value.trim() !== "") {
        updates.unshift(input.value);
        saveUpdates(); // SIMPAN
        input.value = "";
        loadUpdates();
    }
}

loadUpdates();
</script>

</body>
</html>
