<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>H4ll0 w0rld Hub - Dark System</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #000000, #120000);
    color: #e6e6e6;
    text-align: center;
}

/* Page */
.page {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}
.active { display: flex; }

/* Title */
h1 {
    color: #ff2e2e;
    text-shadow: 0 0 10px #ff0000;
    margin-bottom: 10px;
}

p {
    color: #aaa;
}

/* Button */
button {
    padding: 12px 25px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg, #ff0000, #990000);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #ff0000;
}

/* Input */
input {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #550000;
    background: #0a0a0a;
    color: white;
    width: 250px;
}

/* CARD */
.update-box {
    background: #0a0a0a;
    border: 1px solid #220000;
    padding: 15px;
    margin: 10px;
    border-radius: 12px;
    width: 85%;
    max-width: 400px;
    box-shadow: 0 5px 15px rgba(255,0,0,0.2);
    transition: 0.2s;
}

.update-box:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(255,0,0,0.4);
}

/* Loading */
#page2 h1 {
    animation: fade 1s infinite;
}

@keyframes fade {
    0% {opacity: 1;}
    50% {opacity: 0.4;}
    100% {opacity: 1;}
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="page active">
    <h1>🩸 H4ll0 w0rld Hub</h1>
    <p>Are you Viewer or Owner?</p>
    <button onclick="selectRole('viewer')">Viewer</button>
    <button onclick="selectRole('owner')">Owner</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
    <h1>Loading...</h1>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
    <h1>Updates</h1>
    <div id="updates"></div>

    <div id="ownerPanel" style="display:none;">
        <h3>Add Update</h3>
        <input type="text" id="newUpdate" placeholder="Type update...">
        <br>
        <button onclick="addUpdate()">Post</button>
    </div>
</div>

<script>
let role = "";
let updates = [
    "🩸 System initialized...",
    "🔥 Horror theme applied"
];

// password encoded
let encodedPass = "SDQhbDAjVzByTGQkSHViXzlYa1BAMjchelE=";

function checkPassword(input) {
    return btoa(input) === encodedPass;
}

function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
}

function selectRole(r) {
    if (r === "owner") {
        let inputPass = prompt("Enter Owner Password:");
        if (!checkPassword(inputPass)) {
            alert("Wrong Password!");
            return;
        }
    }

    role = r;
    showPage("page2");

    setTimeout(() => {
        showPage("page3");
        loadUpdates();

        if (role === "owner") {
            document.getElementById("ownerPanel").style.display = "block";
        }
    }, 1500);
}

function loadUpdates() {
    let container = document.getElementById("updates");
    container.innerHTML = "";

    updates.forEach(u => {
        let div = document.createElement("div");
        div.className = "update-box";
        div.innerText = u;
        container.appendChild(div);
    });
}

function addUpdate() {
    let input = document.getElementById("newUpdate");
    if (input.value.trim() !== "") {
        updates.unshift(input.value);
        input.value = "";
        loadUpdates();
    }
}
</script>

</body>
            </html>
